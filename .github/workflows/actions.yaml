name: CI/CD - Build & Deploy to Cloudflare Workers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  check-astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn run check:astro

  build-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check-astro]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        locale: [en, fr, de, es, pt, zh]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable

      - name: Build (${{ matrix.locale }})
        run: yarn run build
        env:
          SITE_LOCALE: ${{ matrix.locale }}

      - name: Deploy to Cloudflare Workers (${{ matrix.locale }})
        run: |
          set +e
          cd dist/server
          # strip absolute Windows paths
          node -e "
            const c = require('./wrangler.json');
            delete c.configPath; delete c.userConfigPath;
            require('fs').writeFileSync('wrangler.ci.json', JSON.stringify(c));
          "
          # get existing KV namespace ID (if any) and inject so wrangler doesn't try to create it
          KV_ID=$(yarn wrangler kv namespace list 2>/dev/null | node -e "
            let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
              try { const list=JSON.parse(d); const ns=list.find(n=>n.title==='vectoflare-${{ matrix.locale }}-session'); if(ns) process.stdout.write(ns.id); } catch(e){} 
            })
          ")
          if [ -n "$KV_ID" ]; then
            node -e "
              const c = require('./wrangler.ci.json');
              const kv = c.kv_namespaces || [];
              const idx = kv.findIndex(e => e.binding === 'SESSION');
              if (idx >= 0) { kv[idx].id = '$KV_ID'; }
              c.kv_namespaces = kv;
              require('fs').writeFileSync('wrangler.ci.json', JSON.stringify(c));
            "
          fi
          yarn wrangler deploy --config wrangler.ci.json --name vectoflare-${{ matrix.locale }} > /tmp/deploy-${{ matrix.locale }}.log 2>&1
          rc=$?; cat /tmp/deploy-${{ matrix.locale }}.log; exit $rc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload deploy log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-${{ matrix.locale }}
          path: /tmp/deploy-${{ matrix.locale }}.log

      - name: Set SESSION_SECRET on Worker (${{ matrix.locale }})
        run: |
          cd dist/server && \
          echo "${{ secrets.SESSION_SECRET }}" | \
            yarn wrangler secret put SESSION_SECRET \
              --config wrangler.ci.json \
              --name vectoflare-${{ matrix.locale }} 2>&1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
