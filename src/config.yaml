site:
  name: Vectoflare
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Vectoflare — AI Infrastructure for Modern Businesses
    template: '%s — Vectoflare'
  description: 'We build practical AI systems that connect data, search, and automation. Semantic search, knowledge APIs, and workflow automation for enterprises.'
  keywords:
    - Vectoflare
    - AI search
    - semantic search
    - knowledge API
    - workflow automation
    - enterprise AI
  author: Vectoflare
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Vectoflare
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: en_US
  twitter:
    handle: '@vectoflare'
    site: '@vectoflare'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%'
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null

siteSettings:
  siteName: Vectoflare
  siteTagline: 'AI Infrastructure for Modern Businesses'
  siteDescription: 'We build practical AI systems that connect data, search, and automation. Semantic search, knowledge APIs, and workflow automation for enterprises.'
  organization:
    name: Vectoflare
    logo: ''
    contactEmail: info@vectoflare.com
    contactPhone: '+86 133 0532 4192'
    address: 'Qingdao, China'
  socialLinks:
    - platform: github
      url: 'https://github.com/theworkvigour'
    - platform: rss
      url: /rss.xml

ui:
  theme: 'system'
